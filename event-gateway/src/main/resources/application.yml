server:
  port: 8080

spring:
  application:
    name: event-gateway

  datasource:
    url: jdbc:h2:file:./data/eventdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

account:
  service:
    url: http://localhost:8081

resilience4j:
  circuitbreaker:
    instances:
      accountService:
        sliding-window-size: 5
        minimum-number-of-calls: 3
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2